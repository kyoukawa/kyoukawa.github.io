eyword">do</span></span><br><span class="line">    ./a.out &lt; <span class="variable">$i</span>.<span class="keyword">in</span> &gt; <span class="variable">$i</span>.out <span class="comment">#运行</span></span><br><span class="line">    diff --ignore-all-space --brief <span class="variable">$i</span>.out <span class="variable">$i</span>.ans &gt;/dev/null <span class="comment">#比较是否与答案一致</span></span><br><span class="line">    comp_value=$?</span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> [ <span class="variable">$comp_value</span> -eq 1 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="comment">#错误</span></span><br><span class="line">        <span class="built_in">echo</span> -e <span class="string">&quot;\033[31m<span class="variable">$&#123;i&#125;</span>.Wrong\033[0m&quot;</span> <span class="comment">#输出红色的i.Wrong</span></span><br><span class="line">        <span class="built_in">let</span> w+=1 <span class="comment">#错误数量+1</span></span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="comment">#正确</span></span><br><span class="line">        <span class="built_in">echo</span> -e <span class="string">&quot;\033[32m<span class="variable">$&#123;i&#125;</span>.Correct\033[0m&quot;</span> <span class="comment">#输出绿色的i.Correct</span></span><br><span class="line">        <span class="built_in">let</span> c+=1 <span class="comment">#正确数量+1</span></span><br><span class="line">    <span class="keyword">fi</span></span><br><span class="line"><span class="keyword">done</span></span><br><span class="line">score=$((<span class="number">100</span>*<span class="variable">$c</span>/(<span class="variable">$c</span>+<span class="variable">$w</span>))) <span class="comment">#计算分数(满分100,保留整数)</span></span><br><span class="line"><span class="keyword">if</span> [ <span class="variable">$score</span> -eq 100 ] <span class="comment">#无错误</span></span><br><span class="line"><span class="keyword">then</span></span><br><span class="line">    <span class="comment">#AC祝贺</span></span><br><span class="line">    <span class="built_in">echo</span> -e <span class="string">&quot;\033[32mAC!!!!!\033[0m&quot;</span> <span class="comment">#满分输出绿色</span></span><br><span class="line"><span class="keyword">else</span></span><br><span class="line">    <span class="keyword">if</span> [ <span class="variable">$score</span> -gt 60 ]</span><br><span class="line">    <span class="keyword">then</span></span><br><span class="line">        <span class="built_in">echo</span> -e <span class="string">&quot;\033[34m<span class="variable">$&#123;score&#125;</span>\033[0m&quot;</span> <span class="comment">#&gt;60输出蓝色</span></span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="keyword">if</span> [ <span class="variable">$score</span> -gt 0 ]</span><br><span class="line">        <span class="keyword">then</span></span><br><span class="line">            <span class="built_in">echo</span> -e <span class="string">&quot;\033[33m<span class="variable">$&#123;score&#125;</span>\033[0m&quot;</span> <span class="comment">#&gt;0输出黄色</span></span><br><span class="line">        <span class="keyword">else</span></span><br><span class="line">            <span class="built_in">echo</span> -e <span class="string">&quot;\033[37m<span class="variable">$&#123;score&#125;</span>\033[0m&quot;</span> <span class="comment">#0分输出白色</span></span><br><span class="line">        <span class="keyword">fi</span></span><br><span class="line">    <span class="keyword">fi</span></span><br><span class="line"><span class="keyword">fi</span></span><br></pre></td></tr></table></figure>
